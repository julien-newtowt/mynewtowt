<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — NEWTOWT Bord</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #EFE6D6;
      color: #0D5966;
      font-family: Manrope, system-ui, -apple-system, "Segoe UI", sans-serif;
      text-align: center;
    }
    .box {
      max-width: 28rem;
      padding: 2rem;
      background: #fff;
      border-radius: 12px;
      border-top: 4px solid #0D5966;
      box-shadow: 0 4px 16px rgba(13, 89, 102, 0.15);
    }
    h1 { font-size: 1.4rem; margin: 0 0 0.75rem; }
    p { line-height: 1.5; margin: 0 0 1.25rem; }
    a {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: #0D5966;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hors ligne</h1>
    <p>Hors ligne — vos saisies sont conservées localement et seront
       synchronisées au retour du réseau.</p>
    <a href="/onboard">Retour à l'espace bord</a>
  </div>
</body>
</html>
