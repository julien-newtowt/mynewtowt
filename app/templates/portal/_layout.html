{% extends "base.html" %}
{% block body %}
<div class="portal-shell" style="min-height:100vh; background: var(--bg-0);">
  <header class="portal-header" style="background: var(--blanc); border-bottom: 1px solid var(--gris-clair); padding: var(--space-3) var(--space-5); display:flex; align-items:center; justify-content:space-between;">
    <a href="/p/{{ token }}" style="border:none;">
      <img src="{{ brand.logo_light }}" alt="{{ brand.nom_court }}" style="height: 38px;" />
    </a>
    <nav style="display:flex; gap: var(--space-4);">
      <a href="/p/{{ token }}">Vue d'ensemble</a>
      <a href="/p/{{ token }}/packing">Packing list</a>
      <a href="/p/{{ token }}/documents">Documents</a>
      <a href="/p/{{ token }}/messages">Messages</a>
      <a href="/p/{{ token }}/privacy" class="text-muted">Confidentialité</a>
    </nav>
  </header>

  <main id="main" class="container" style="padding: var(--space-5) var(--space-5);">
    {% block portal_content %}{% endblock %}
  </main>

  <footer style="background: var(--teal-dark); color: var(--blanc-casse); padding: var(--space-4) var(--space-5); margin-top: var(--space-7); font-size: var(--text-xs);">
    <div class="container flex justify-between" style="border-bottom:none;">
      <span>© {{ brand.nom_court }} — portail expéditeur sécurisé</span>
      <span>{{ brand.adresse }} · <a href="mailto:{{ brand.email }}" style="color:var(--vert-light);">{{ brand.email }}</a></span>
    </div>
  </footer>
</div>
{% endblock %}
