{% extends "base.html" %}
{% block title %}{{ t('smfa_title', lang) }} — {{ brand.nom_court }}{% endblock %}
{% block body %}
<div class="auth-shell"
     style="background-image: linear-gradient(rgba(13,89,102,.78), rgba(13,89,102,.86)), url('{{ asset('img/equipe-newtowt.jpg') }}'); background-size: cover; background-position: center;">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="{{ brand.logo_light }}" alt="{{ brand.nom_court }}" />
    </div>
    <span class="kicker text-center" style="display:block;">{{ t('smfa_meta', lang) }}</span>
    <h2>{{ t('smfa_title', lang) }}</h2>
    <p class="text-muted text-sm">
      {{ t('smfa_hint', lang) }}
    </p>
    {% if error %}
      <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login/mfa" autocomplete="off">
      <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}" />
      <div class="field">
        <label for="code">{{ t('smfa_code_label', lang) }}</label>
        <input id="code" name="code" type="text"
               inputmode="text" autocomplete="one-time-code" required autofocus
               minlength="6" maxlength="20"
               style="font-size:1.25rem; letter-spacing:0.2em; text-align:center;" />
      </div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">{{ t('smfa_verify', lang) }}</button>
    </form>
    <p class="text-center text-muted mt-4 text-sm">
      <a href="/login">← {{ t('smfa_back', lang) }}</a>
    </p>
  </div>
</div>
{% endblock %}
