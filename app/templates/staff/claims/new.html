{% extends "staff/_layout.html" %}
{% block title %}Nouveau claim{% endblock %}
{% block content %}
<a href="/claims" class="btn btn-ghost mb-3">← Claims</a>
<header class="mb-4"><span class="kicker">Risque</span><h1 class="display">Nouveau claim</h1></header>
<form method="post" action="/claims/new" class="card">
  <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}" />
  <div class="grid grid-2 gap-3">
    <div class="field"><label>Type</label><select name="claim_type" required><option value="cargo">Cargo</option><option value="crew">Équipage</option><option value="hull">Hull/DIV</option><option value="war_risk">War risk</option><option value="third_party">Tiers</option><option value="other">Autre</option></select></div>
    <div class="field"><label>Leg lié</label><select name="leg_id"><option value="">—</option>{% for l in legs %}<option value="{{ l.id }}">{{ l.leg_code }}</option>{% endfor %}</select></div>
    <div class="field" style="grid-column:span 2;"><label>Titre</label><input name="title" required /></div>
    <div class="field" style="grid-column:span 2;"><label>Description</label><textarea name="description" rows="4" required></textarea></div>
    <div class="field"><label>Survenu le</label><input name="occurred_at" type="datetime-local" required /></div>
    <div class="field"><label>Provision (EUR)</label><input name="provision_eur" type="number" step="0.01" /></div>
    <div class="field"><label>Assureur</label><input name="insurer" /></div>
  </div>
  <button class="btn btn-primary mt-3" type="submit">Créer le claim</button>
</form>
{% endblock %}
