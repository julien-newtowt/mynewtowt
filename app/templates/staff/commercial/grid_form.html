{% extends "staff/_layout.html" %}
{% block title %}Nouvelle grille — {{ brand.nom_court }}{% endblock %}
{% block content %}

<header class="mb-4">
  <span class="kicker">Commercial</span>
  <h1 class="display">Nouvelle grille tarifaire</h1>
  <p class="text-muted">Les 7 brackets dégressifs (lt50 → full ship) sont créés automatiquement selon le type de client.</p>
</header>

<article class="card">
  <form method="post" action="/commercial/grids">
    <div class="grid grid-2 gap-4">
      <div class="field">
        <label for="client_id">Client</label>
        <select id="client_id" name="client_id" required>
          {% for c in clients %}<option value="{{ c.id }}">{{ c.name }} ({{ c.client_type }})</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="base_rate">Tarif base (€/palette)</label>
        <input id="base_rate" name="base_rate" type="number" min="0" step="0.01" required />
      </div>
      <div class="field">
        <label for="valid_from">Valide du</label>
        <input id="valid_from" name="valid_from" type="date" required />
      </div>
      <div class="field">
        <label for="valid_to">Valide jusqu'au</label>
        <input id="valid_to" name="valid_to" type="date" />
      </div>
      <div class="field">
        <label for="adjustment_index">Index d'ajustement</label>
        <input id="adjustment_index" name="adjustment_index" type="number" step="0.0001" value="1.0" />
      </div>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary">Créer la grille</button>
      <a href="/commercial/grids" class="btn btn-ghost">Annuler</a>
    </div>
  </form>
</article>

{% endblock %}
