{% extends "base.html" %}

{% block body %}
<div class="app-shell">
  <aside class="sidebar" aria-label="Menu client">
    <div class="brand-mark">
      <a href="/me" style="border:none;">
        <img src="{{ brand.logo_white }}" alt="{{ brand.nom_court }}" />
      </a>
    </div>
    <small class="role-label">Espace client</small>
    <nav>
      <ul>
        <li><a href="/me">Tableau de bord</a></li>
        <li><a href="/me/bookings">Mes réservations</a></li>
        <li><a href="/me/invoices">Mes factures</a></li>
        <li><a href="/me/co2">Mes certificats CO₂</a></li>
        <li><a href="/me/account">Mon compte</a></li>
      </ul>
      <div class="mt-5">
        <a href="/booking/new" class="btn btn-accent btn-block">+ Nouvelle réservation</a>
      </div>
      <div class="mt-4">
        <a href="/me/logout" class="btn btn-ghost btn-block" style="color:var(--bleu-horizon);">Déconnexion</a>
      </div>
    </nav>
  </aside>

  <main id="main" class="main">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
