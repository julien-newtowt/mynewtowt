{# Topbar — client variant. #}
<header class="topbar" role="banner">
  <button type="button" class="sidebar-toggle" data-sidebar-toggle aria-label="Basculer la barre latérale">
    <i data-lucide="menu" class="nav-icon"></i>
  </button>

  <div class="topbar-title">{% block topbar_title %}Espace client{% endblock %}</div>

  <div class="topbar-actions">
    <div class="clock-widget" aria-live="off">
      <div class="clock-item">
        <span class="clock-time" data-clock="local">--:--</span>
        <span class="clock-label" data-tz="local-label">Local</span>
      </div>
      <span class="clock-sep" aria-hidden="true"></span>
      <div class="clock-item">
        <span class="clock-time" data-clock="paris">--:--</span>
        <span class="clock-label">Paris</span>
      </div>
    </div>

    <a href="/booking/new" class="topbar-action" title="Nouvelle réservation">
      <i data-lucide="plus"></i>
    </a>

    <button type="button" class="topbar-action" id="topbar-user-btn" data-menu-toggle="topbar-user-menu" title="Mon compte" aria-haspopup="menu">
      <i data-lucide="user"></i>
    </button>
    <div class="topbar-menu" id="topbar-user-menu" role="menu">
      <div class="menu-header">{% if client is defined and client %}{{ client.company_name }}{% else %}Compte{% endif %}</div>
      <a href="/me/account"><i data-lucide="settings"></i><span>Mon compte</span></a>
      <a href="/me/bookings"><i data-lucide="package"></i><span>Mes réservations</span></a>
      <a href="/me/invoices"><i data-lucide="euro"></i><span>Mes factures</span></a>
      <div class="menu-divider"></div>
      <a href="/me/logout" style="color: var(--danger);"><i data-lucide="log-out"></i><span>Déconnexion</span></a>
    </div>
  </div>
</header>
